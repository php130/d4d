<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resilient Maritime COP Demo</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">D4D T3 Demo</p>
          <h1>Resilient Maritime COP</h1>
        </div>
        <div class="topbar-metrics" id="topbarMetrics"></div>
      </header>

      <section class="glossary-panel" aria-label="Terminology helper">
        <div>
          <p class="panel-kicker">Glossary</p>
          <div class="glossary-chips" id="glossaryChips"></div>
        </div>
        <div class="glossary-definition" id="glossaryDefinition" aria-live="polite"></div>
      </section>

      <section class="mode-strip" aria-label="Network mode selector">
        <div class="mode-buttons" id="modeButtons"></div>
        <div class="mode-summary" id="modeSummary"></div>
      </section>

      <section class="dashboard-grid">
        <section class="panel map-panel" aria-label="COP map">
          <div class="panel-heading">
            <div>
              <p class="panel-kicker">COP Map</p>
              <h2>Yellow Sea AOI</h2>
            </div>
            <span class="status-pill" id="selectedDecision">...</span>
          </div>
          <div class="map-stage">
            <svg id="copMap" viewBox="0 0 1000 640" role="img" aria-label="Maritime COP map visualization"></svg>
          </div>
        </section>

        <section class="panel queue-panel" aria-label="Event queue">
          <div class="panel-heading">
            <div>
              <p class="panel-kicker">Priority Queue</p>
              <h2>Semantic Events</h2>
            </div>
          </div>
          <div class="event-list" id="eventList"></div>
        </section>

        <section class="panel evidence-panel" aria-label="Evidence bundle">
          <div class="panel-heading">
            <div>
              <p class="panel-kicker">Evidence</p>
              <h2 id="evidenceTitle">Selected Event</h2>
            </div>
            <span class="status-pill muted" id="reviewStatus">review</span>
          </div>
          <div id="evidenceBody"></div>
        </section>

        <section class="panel route-panel" aria-label="Routing result">
          <div class="panel-heading">
            <div>
              <p class="panel-kicker">Transmission</p>
              <h2>Raw vs Semantic</h2>
            </div>
          </div>
          <div id="routingMetrics"></div>
          <div class="packet-table" id="packetTable"></div>
        </section>
      </section>

      <section class="panel briefing-panel" aria-label="Grounded briefing">
        <div class="panel-heading">
          <div>
            <p class="panel-kicker">Briefing</p>
            <h2>Grounded COP Summary</h2>
          </div>
        </div>
        <div id="briefingBody"></div>
      </section>
    </main>

    <script src="./assets/glossary.js"></script>
    <script src="./data/mock_dataset.js"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
